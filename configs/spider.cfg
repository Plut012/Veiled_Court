# Spider Configuration
# The Trickster - peak human creativity pre-AI, 5d, 1980-1990 era
# High temperature + noise creates genuine unpredictability

# Neural networks
nnModelFile = assets/katago/kata1-b28c512nbt.gz
humanModelFile = assets/katago/b18c384nbt-humanv0.bin.gz

# Search parameters
maxVisits = 1500
humanSLProfile = preaz_5d

# Temperature settings
rootPolicyTemperature = 1.4
chosenMoveTemperature = 1.4

# Utility factors
winLossUtilityFactor = 1.0
staticScoreUtilityFactor = 0.3

# Noise
rootNoiseEnabled = true

# Required GTP settings
logAllGTPCommunication = false
logSearchInfo = false
logToStderr = false

# Rules
koRule = POSITIONAL
scoringRule = AREA
taxRule = NONE
multiStoneSuicideLegal = false
hasButton = false
encorePhase = 0

# Threading
numSearchThreads = 2

