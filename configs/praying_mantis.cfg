# Praying Mantis Configuration
# The Blood Warrior - mid-size standard net
# Score utility stripped, win/loss maximized for fighting positions

# Neural networks
nnModelFile = assets/katago/kata1-b28c512nbt.gz

# Search parameters
maxVisits = 2000

# Temperature settings
rootPolicyTemperature = 1.2
chosenMoveTemperature = 1.2

# Utility factors
winLossUtilityFactor = 2.0
