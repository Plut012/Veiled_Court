# Jaguar Configuration
# The Endgame Assassin - dynamic visit scaling via middleware
# Low visits early = casual, dramatic ramp after move ~120

# Neural networks
nnModelFile = assets/katago/kata1-b28c512nbt.gz

# Search parameters
# NOTE: maxVisits will be dynamically overridden by middleware
# Base value for opening phase
maxVisits = 500

# Temperature settings
# High early, approaching 0 late game (middleware controlled)
rootPolicyTemperature = 1.2
chosenMoveTemperature = 1.2

# Utility factors
# Very high score utility in endgame phase
winLossUtilityFactor = 1.0
staticScoreUtilityFactor = 1.5

# Noise
rootNoiseEnabled = false

# Required GTP settings
logAllGTPCommunication = false
logSearchInfo = false
logToStderr = false

# Rules
koRule = POSITIONAL
scoringRule = AREA
taxRule = NONE
multiStoneSuicideLegal = false
hasButton = false
encorePhase = 0

# Threading
numSearchThreads = 2

