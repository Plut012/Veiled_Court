version: '3.8'

services:
  animal-go:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: animal-go-prod
    ports:
      - "3000:3000"
    environment:
      - KATAGO_BINARY=/usr/local/bin/katago
      - KATAGO_NETS_PATH=/app/nets
      - ANIMAL_GO_CONFIG_DIR=/app/configs
      - RUST_LOG=info
      - ENV=production
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    volumes:
      # Optional: persist logs
      - ./logs:/app/logs
