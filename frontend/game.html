<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Game - Spirit Animals</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/board.css">
</head>
<body class="theme-dragon">
  <div id="loading-overlay">
    <div id="loading-spirit"></div>
  </div>

  <div id="game-screen">
    <div id="turn-line-top" class="turn-line"></div>

    <div id="board-container">
      <canvas id="board"></canvas>
    </div>

    <div id="turn-line-bottom" class="turn-line"></div>

    <div id="submit-bar" style="display:none"></div>

    <div id="controls">
      <button id="pass-btn">Pass</button>
      <button id="resign-btn">Resign</button>
    </div>

    <div id="info" style="display:none">
      <span id="move-count"></span>
      <span id="current-turn"></span>
      <span id="last-move"></span>
    </div>
  </div>

  <script src="js/board.js"></script>
  <script src="js/websocket.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
